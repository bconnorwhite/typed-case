name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Checkout default branch
        run: |
          git fetch origin ${{ github.event.repository.default_branch }}
          git checkout ${{ github.event.repository.default_branch }}

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Bump version
        if: inputs.bump != 'none'
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run coverage
        run: npm run coverage

      - name: Get version and tag
        id: version
        run: |
          VERSION=$(npx pkgv)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Fail if tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release commit
        run: |
          if [ "${{ inputs.bump }}" = "none" ]; then
            git commit --allow-empty -m "${{ steps.version.outputs.tag }}"
          else
            git add package.json
            git commit -m "${{ steps.version.outputs.tag }}"
          fi

      - name: Create tag
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.event.repository.default_branch }}
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        run: npm publish

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
